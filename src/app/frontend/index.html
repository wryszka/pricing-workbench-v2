<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing Workbench v2 — Bricksurance SE</title>

    <!-- Tailwind via CDN (JIT in-browser, supports arbitrary utility classes). -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { sidebar: "#1e293b", sidebarAccent: "#334155" },
          },
        },
      };
    </script>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: #f8fafc; }
      .md-report h1 { font-size: 1.5rem; font-weight: 600; color: #0f172a; margin-top: 1.5rem; margin-bottom: 0.75rem; }
      .md-report h2 { font-size: 1.25rem; font-weight: 600; color: #1e293b; margin-top: 1.5rem; margin-bottom: 0.5rem; }
      .md-report h3 { font-size: 1rem; font-weight: 600; color: #334155; margin-top: 1rem; margin-bottom: 0.5rem; }
      .md-report p  { color: #334155; line-height: 1.6; margin: 0.5rem 0; }
      .md-report ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; color: #334155; }
      .md-report li { margin: 0.25rem 0; }
      .md-report table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.75rem; }
      .md-report th { background: #f1f5f9; text-align: left; padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; font-weight: 500; }
      .md-report td { padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; }
      .md-report code { background: #f1f5f9; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: ui-monospace, Menlo, monospace; font-size: 0.875rem; }
      .md-report a { color: #2563eb; }
      .md-report a:hover { text-decoration: underline; }
      .md-report img { max-width: 100%; border-radius: 0.375rem; border: 1px solid #e2e8f0; margin: 0.75rem 0; background: #fff; }
      .md-report strong { color: #0f172a; font-weight: 600; }
    </style>

    <!-- esm.sh pins React + Router + Markdown + Lucide. All buildless. -->
    <script type="importmap">
      {
        "imports": {
          "react":              "https://esm.sh/react@18.3.1",
          "react-dom":          "https://esm.sh/react-dom@18.3.1",
          "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client",
          "react/jsx-runtime":  "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-router-dom":   "https://esm.sh/react-router-dom@6.28.0?deps=react@18.3.1,react-dom@18.3.1",
          "lucide-react":       "https://esm.sh/lucide-react@0.474.0?deps=react@18.3.1",
          "react-markdown":     "https://esm.sh/react-markdown@9.0.3?deps=react@18.3.1",
          "remark-gfm":         "https://esm.sh/remark-gfm@4.0.0"
        }
      }
    </script>

    <!-- Babel Standalone: transforms the inline <script type="text/babel"> below so we can
         write JSX directly. No npm, no bundler. ~110KB, one-time cost. -->
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
      // -----------------------------------------------------------------
      // Pricing Workbench v2 — single-file React SPA, buildless via Babel
      // -----------------------------------------------------------------
      import React, { useEffect, useState } from "react";
      import { createRoot } from "react-dom/client";
      import {
        HashRouter, Routes, Route, Link, NavLink, useParams,
      } from "react-router-dom";
      import ReactMarkdown from "react-markdown";
      import remarkGfm from "remark-gfm";
      import {
        Database, FlaskConical, Boxes, FileText, Rocket, Activity,
        Shield, Zap, LineChart, BookOpen, ArrowRight, ArrowLeft,
        ChevronRight, Trophy, CheckCircle2, XCircle, Clock, Download,
      } from "lucide-react";

      // ---------- fetch wrapper ----------
      async function api(path, init) {
        const r = await fetch(path.startsWith("/") ? path : `/api/${path}`, {
          headers: { "Content-Type": "application/json" }, ...init,
        });
        if (!r.ok) throw new Error(`${r.status}: ${await r.text().catch(() => r.statusText)}`);
        return r.json();
      }
      const fmt  = (n) => (n === null || n === undefined) ? "—" : Number(n).toLocaleString();
      const pct  = (n, d = 1) => (n === null || n === undefined) ? "—" : `${(Number(n) * 100).toFixed(d)}%`;

      // ---------- shared components ----------
      function Sidebar() {
        const NAV = [
          { to: "/",              label: "Home",               icon: LineChart },
          { to: "/external-data", label: "External Data",      icon: Database },
          { to: "/feature-table", label: "Feature Table",      icon: Boxes },
          { to: "/policies",      label: "Policies",           icon: BookOpen },
          { to: "/model-factory", label: "Model Factory",      icon: FlaskConical },
          { to: "/reports",       label: "Regulatory Reports", icon: FileText },
          { to: "/serving",       label: "Serving",            icon: Rocket },
          { to: "/monitoring",    label: "Monitoring",         icon: Activity },
          { to: "/governance",    label: "Governance",         icon: Shield },
          { to: "/quote-review",  label: "Quote Review",       icon: Zap },
        ];
        return (
          <aside className="w-56 shrink-0 bg-sidebar text-slate-200 flex flex-col min-h-screen">
            <div className="p-4 border-b border-slate-700">
              <div className="font-semibold text-white">Pricing Workbench</div>
              <div className="text-xs text-slate-400 mt-0.5">v2 — Bricksurance SE</div>
            </div>
            <nav className="flex-1 p-2 space-y-0.5">
              {NAV.map(({ to, label, icon: Icon }) => (
                <NavLink key={to} to={to} end={to === "/"}
                  className={({ isActive }) =>
                    "flex items-center gap-2 px-3 py-2 rounded text-sm transition " +
                    (isActive ? "bg-blue-600 text-white" : "hover:bg-sidebarAccent text-slate-300")
                  }>
                  <Icon size={16} /><span>{label}</span>
                </NavLink>
              ))}
            </nav>
            <div className="p-3 border-t border-slate-700 text-[11px] text-slate-500">
              Actuary-accurate pricing pipeline · regulator-ready reports
            </div>
          </aside>
        );
      }

      function PageHeader({ title, subtitle, actions }) {
        return (
          <div className="mb-6 flex items-start justify-between gap-4">
            <div>
              <h1 className="text-2xl font-semibold text-slate-900">{title}</h1>
              {subtitle && <p className="text-slate-600 text-sm mt-1">{subtitle}</p>}
            </div>
            {actions && <div className="flex items-center gap-2">{actions}</div>}
          </div>
        );
      }

      function Card({ title, right, children, className = "" }) {
        return (
          <div className={`bg-white rounded-lg border border-slate-200 ${className}`}>
            {(title || right) && (
              <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-3">
                {title && <h3 className="font-medium text-slate-800">{title}</h3>}
                {right}
              </div>
            )}
            <div className="p-4">{children}</div>
          </div>
        );
      }

      function StatNumber({ value, label, hint }) {
        return (
          <div>
            <div className="text-2xl font-semibold text-slate-900">{value}</div>
            <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">{label}</div>
            {hint && <div className="text-xs text-slate-400 mt-0.5">{hint}</div>}
          </div>
        );
      }

      function Badge({ children, tone = "slate" }) {
        const tones = {
          slate: "bg-slate-100 text-slate-700 border-slate-200",
          green: "bg-emerald-50 text-emerald-700 border-emerald-200",
          amber: "bg-amber-50 text-amber-700 border-amber-200",
          red:   "bg-red-50 text-red-700 border-red-200",
          blue:  "bg-blue-50 text-blue-700 border-blue-200",
        };
        return (
          <span className={`inline-flex items-center px-2 py-0.5 text-[11px] rounded border ${tones[tone]}`}>
            {children}
          </span>
        );
      }

      function Table({ columns, rows, empty = "No data" }) {
        if (!rows || rows.length === 0)
          return <div className="text-sm text-slate-500 italic py-4">{empty}</div>;
        return (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-slate-500 text-xs uppercase tracking-wide border-b border-slate-200">
                  {columns.map((c) => (
                    <th key={c.key} className={`font-medium py-2 pr-3 ${c.className || ""}`}>{c.label}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {rows.map((row, i) => (
                  <tr key={i} className="hover:bg-slate-50">
                    {columns.map((c) => (
                      <td key={c.key} className={`py-2 pr-3 ${c.className || ""}`}>
                        {c.render ? c.render(row) : row[c.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      // ---------- pages ----------
      const PILLAR_META = {
        ingestion:  { icon: Database,     description: "4 vendor feeds → silver → gold. DLT data-quality gates, approval workflow." },
        features:   { icon: Boxes,        description: "Policy-year training + quote training + serving-time lookup tables." },
        modelling:  { icon: FlaskConical, description: "GLM + GBM + XGBoost + PyMC. Champion/challenger in UC model registry." },
        reports:    { icon: FileText,     description: "Per-model regulatory reports — lineage, SHAP reason codes, fairness audit." },
        serving:    { icon: Rocket,       description: "Model serving endpoint + online feature store. (Phase 4 — placeholder)" },
        governance: { icon: Shield,       description: "Audit log, dataset approvals, fairness report, model governance table." },
      };

      function Home() {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        useEffect(() => { api("home").then(setData).catch((e) => setErr(String(e))); }, []);
        if (err) return <div className="text-red-600 text-sm">{err}</div>;
        if (!data) return <div className="text-slate-500 text-sm">Loading…</div>;
        const c = data.counts;
        return (
          <>
            <PageHeader title={`${data.entity} — Pricing Workbench`} subtitle={`Unity Catalog: ${data.catalog}`} />
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
              <Card><StatNumber value={fmt(c.dim_companies)} label="Companies" /></Card>
              <Card><StatNumber value={fmt(c.dim_policies)} label="Policies" hint={`${fmt(c.dim_policy_versions)} versions`} /></Card>
              <Card><StatNumber value={fmt(c.fact_quotes)} label="Quotes (4-year)" /></Card>
              <Card><StatNumber value={fmt(c.fact_claims)} label="Claims" /></Card>
              <Card><StatNumber value={fmt(c.feature_policy_year_training)} label="Training rows (policy-year)" /></Card>
              <Card><StatNumber value={fmt(c.feature_quote_training)} label="Training rows (quote)" /></Card>
              <Card><StatNumber value={fmt(c.model_governance)} label="Generated reports" /></Card>
              <Card><StatNumber value={fmt(c.app_audit_log)} label="Audit events" /></Card>
            </div>
            <h2 className="text-lg font-semibold text-slate-800 mb-3">Pillars</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {data.pillars.map((p) => {
                const meta = PILLAR_META[p.id] || {};
                const Icon = meta.icon || Shield;
                return (
                  <Link key={p.id} to={p.path}
                    className="block bg-white rounded-lg border border-slate-200 p-5 hover:border-blue-400 hover:shadow-sm transition">
                    <div className="flex items-start gap-3">
                      <div className="p-2 rounded bg-blue-50 text-blue-600 shrink-0"><Icon size={18} /></div>
                      <div className="flex-1">
                        <div className="flex items-center justify-between">
                          <div className="font-medium text-slate-900">{p.name}</div>
                          <ArrowRight size={14} className="text-slate-400" />
                        </div>
                        <p className="text-sm text-slate-600 mt-1 leading-relaxed">{meta.description}</p>
                      </div>
                    </div>
                  </Link>
                );
              })}
            </div>
            <div className="mt-8">
              <Card title="About this demo">
                <div className="text-sm text-slate-700 space-y-2">
                  <p><strong>Bricksurance SE Pricing Workbench v2</strong> is a synthetic commercial-insurance pricing pipeline designed to demonstrate an actuary-accurate data model, a full model factory (GLM + GBM + XGBoost + PyMC), and regulator-ready explainability end-to-end.</p>
                  <p>Every feature traces back to a source CSV → bronze → DLT silver → feature table → model via Delta versioning + MLflow dataset lineage. Every model gets a markdown report with SHAP reason codes, partial-dependence plots, and a protected-attribute audit.</p>
                  <p className="text-xs text-slate-500"><Badge tone="amber">synthetic data</Badge> All data is simulated. No real Bricksurance or partner data is used.</p>
                </div>
              </Card>
            </div>
          </>
        );
      }

      function ExternalData() {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        useEffect(() => { api("datasets").then(setData).catch((e) => setErr(String(e))); }, []);
        return (
          <>
            <PageHeader title="External Data"
              subtitle="Four vendor feeds arrive as CSVs in the external_landing volume, ingested to raw_* tables, then validated by DLT into silver_* tables." />
            {err && <div className="text-red-600 text-sm mb-4">{err}</div>}
            <Card>
              <Table empty={data ? "No datasets" : "Loading…"}
                columns={[
                  { key: "name", label: "Dataset", render: (r) => (
                    <Link to={`/external-data/${r.id}`} className="text-blue-600 hover:underline font-medium flex items-center gap-1">
                      {r.name} <ChevronRight size={14} />
                    </Link>
                  ) },
                  { key: "description", label: "Description" },
                  { key: "owner", label: "Owner" },
                  { key: "raw_count",    label: "Raw rows",    render: (r) => fmt(r.raw_count) },
                  { key: "silver_count", label: "Silver rows", render: (r) => fmt(r.silver_count) },
                  { key: "dropped",      label: "DQ drops",    render: (r) => fmt(Math.max(0, r.raw_count - r.silver_count)) },
                ]}
                rows={data?.datasets ?? []} />
            </Card>
          </>
        );
      }

      function DatasetDetail() {
        const { id } = useParams();
        const [data, setData] = useState(null);
        const [approvals, setApprovals] = useState([]);
        const [tab, setTab] = useState("schema");
        const [reviewer, setReviewer] = useState("actuary.demo");
        const [notes, setNotes] = useState("");
        const [flash, setFlash] = useState(null);
        const [err, setErr] = useState(null);
        const reload = () => {
          api(`datasets/${id}`).then(setData).catch((e) => setErr(String(e)));
          api(`datasets/${id}/approvals`).then((r) => setApprovals(r.approvals)).catch(() => {});
        };
        useEffect(reload, [id]);

        async function submitDecision(decision) {
          try {
            await api(`datasets/${id}/approve`, { method: "POST", body: JSON.stringify({ decision, reviewer, notes }) });
            setFlash(`Recorded ${decision}`);
            setNotes("");
            setTimeout(() => setFlash(null), 3000);
            reload();
          } catch (e) { setErr(String(e)); }
        }

        if (err)  return <div className="text-red-600 text-sm">{err}</div>;
        if (!data) return <div className="text-slate-500 text-sm">Loading…</div>;
        return (
          <>
            <Link to="/external-data" className="text-sm text-slate-600 hover:underline flex items-center gap-1 mb-3">
              <ArrowLeft size={14} /> Back to datasets
            </Link>
            <PageHeader title={data.name} subtitle={data.description} />
            <div className="grid grid-cols-4 gap-4 mb-6">
              <Card><StatNumber value={fmt(data.raw_count)} label="Raw rows" hint={data.raw_fqn} /></Card>
              <Card><StatNumber value={fmt(data.silver_count)} label="Silver rows" hint={data.silver_fqn} /></Card>
              <Card><StatNumber value={fmt(data.rows_dropped_by_dq)} label="Dropped by DQ" /></Card>
              <Card><StatNumber value={pct(data.dq_pass_rate, 2)} label="DQ pass rate" /></Card>
            </div>
            {flash && <div className="mb-4 p-3 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded text-sm">{flash}</div>}
            <Card title="Actuary approval" className="mb-6">
              <div className="text-sm text-slate-600 mb-3">
                Record a review decision on the <strong>current Delta snapshot</strong> (raw v{data.raw_count} rows). Both the decision and an audit-log entry will be written.
              </div>
              <div className="flex flex-wrap items-end gap-3">
                <div>
                  <label className="text-xs text-slate-500 block">Reviewer</label>
                  <input value={reviewer} onChange={(e) => setReviewer(e.target.value)}
                    className="border border-slate-300 rounded px-2 py-1 text-sm w-48" />
                </div>
                <div className="flex-1 min-w-64">
                  <label className="text-xs text-slate-500 block">Notes</label>
                  <input value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Optional notes"
                    className="border border-slate-300 rounded px-2 py-1 text-sm w-full" />
                </div>
                <button onClick={() => submitDecision("approved")}
                  className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded text-sm flex items-center gap-1">
                  <CheckCircle2 size={14} /> Approve
                </button>
                <button onClick={() => submitDecision("rejected")}
                  className="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded text-sm flex items-center gap-1">
                  <XCircle size={14} /> Reject
                </button>
              </div>
            </Card>
            <div className="flex gap-1 mb-3 border-b border-slate-200">
              {["schema", "sample", "approvals"].map((t) => (
                <button key={t} onClick={() => setTab(t)}
                  className={`px-3 py-1.5 text-sm border-b-2 -mb-px ${
                    tab === t ? "border-blue-600 text-blue-700 font-medium" : "border-transparent text-slate-600 hover:text-slate-900"
                  }`}>
                  {t === "schema" ? "Silver schema" : t === "sample" ? "Sample rows" : `Approvals (${approvals.length})`}
                </button>
              ))}
            </div>
            <Card>
              {tab === "schema" && (
                <Table
                  columns={[
                    { key: "col_name",  label: "Column" },
                    { key: "data_type", label: "Type" },
                    { key: "comment",   label: "Comment" },
                  ]}
                  rows={data.silver_schema} />
              )}
              {tab === "sample" && (
                data.silver_sample?.length > 0 ? (
                  <div className="overflow-x-auto">
                    <table className="text-xs">
                      <thead><tr>{Object.keys(data.silver_sample[0]).map((k) => (
                        <th key={k} className="text-left bg-slate-100 px-2 py-1 border border-slate-200 font-medium whitespace-nowrap">{k}</th>
                      ))}</tr></thead>
                      <tbody>{data.silver_sample.map((row, i) => (
                        <tr key={i}>{Object.values(row).map((v, j) => (
                          <td key={j} className="px-2 py-1 border border-slate-200 whitespace-nowrap">{v === null ? "—" : String(v)}</td>
                        ))}</tr>
                      ))}</tbody>
                    </table>
                  </div>
                ) : <div className="text-sm text-slate-500 italic">No rows</div>
              )}
              {tab === "approvals" && (
                <Table empty="No approvals yet"
                  columns={[
                    { key: "decision", label: "Decision", render: (r) => (
                      <Badge tone={r.decision === "approved" ? "green" : "red"}>{r.decision}</Badge>
                    ) },
                    { key: "reviewer",      label: "Reviewer" },
                    { key: "reviewer_notes",label: "Notes" },
                    { key: "raw_row_count", label: "Raw rows" },
                    { key: "silver_row_count", label: "Silver rows" },
                    { key: "reviewed_at",   label: "At" },
                  ]}
                  rows={approvals} />
              )}
            </Card>
          </>
        );
      }

      function FeatureTable() {
        const [fts, setFts] = useState([]);
        const [catalog, setCatalog] = useState([]);
        useEffect(() => {
          api("features").then((r) => setFts(r.feature_tables)).catch(() => {});
          api("features/catalog").then((r) => setCatalog(r.features)).catch(() => {});
        }, []);
        return (
          <>
            <PageHeader title="Feature Tables"
              subtitle="Point-in-time joins live here. These are the tables every model consumes — versioned in Delta, tracked in MLflow." />
            <div className="space-y-4 mb-8">
              {fts.map((ft) => (
                <Link key={ft.id} to={`/feature-table/${ft.id}`}
                  className="block bg-white rounded-lg border border-slate-200 p-5 hover:border-blue-400 hover:shadow-sm transition">
                  <div className="flex items-start justify-between gap-4">
                    <div className="flex-1">
                      <div className="flex items-center gap-2 flex-wrap">
                        <code className="text-blue-700 font-medium">{ft.fqn}</code>
                        {ft.delta_version !== null && <Badge tone="blue">Delta v{ft.delta_version}</Badge>}
                      </div>
                      <div className="text-xs text-slate-500 mt-0.5">Grain: {ft.grain}</div>
                      <p className="text-sm text-slate-700 mt-2">{ft.description}</p>
                      <div className="text-xs text-slate-500 mt-2 flex gap-1 flex-wrap items-center">
                        Used by:{" "}{ft.used_by.map((u) => <Badge key={u} tone="slate">{u}</Badge>)}
                      </div>
                    </div>
                    <div className="text-right">
                      <div className="text-2xl font-semibold text-slate-900">{fmt(ft.row_count)}</div>
                      <div className="text-xs text-slate-500 uppercase tracking-wide">rows</div>
                      <ChevronRight size={14} className="text-slate-400 mt-1 inline" />
                    </div>
                  </div>
                </Link>
              ))}
            </div>
            <Card title={`Feature catalog (${catalog.length} features)`}>
              <Table empty="Loading…"
                columns={[
                  { key: "feature_name",   label: "Feature", className: "font-medium" },
                  { key: "feature_group",  label: "Group", render: (r) => <Badge tone="slate">{r.feature_group}</Badge> },
                  { key: "source_tables",  label: "Source", render: (r) => Array.isArray(r.source_tables) ? r.source_tables.join(", ") : r.source_tables },
                  { key: "transformation", label: "Transformation" },
                  { key: "owner",          label: "Owner" },
                  { key: "regulatory_sensitive", label: "Sensitive", render: (r) => r.regulatory_sensitive ? <Badge tone="amber">yes</Badge> : "" },
                  { key: "pii",            label: "PII", render: (r) => r.pii ? <Badge tone="red">PII</Badge> : "" },
                ]}
                rows={catalog} />
            </Card>
          </>
        );
      }

      function FeatureTableDetail() {
        const { id } = useParams();
        const [data, setData] = useState(null);
        const [tab, setTab] = useState("schema");
        useEffect(() => { api(`features/${id}`).then(setData).catch(() => {}); }, [id]);
        if (!data) return <div className="text-slate-500 text-sm">Loading…</div>;
        return (
          <>
            <Link to="/feature-table" className="text-sm text-slate-600 hover:underline flex items-center gap-1 mb-3">
              <ArrowLeft size={14} /> Back to feature tables
            </Link>
            <PageHeader title={data.fqn} />
            <div className="flex gap-1 mb-3 border-b border-slate-200">
              {["schema", "sample", "history"].map((t) => (
                <button key={t} onClick={() => setTab(t)}

                  <Route path="/external-data"       element={<ExternalData />} />
                  <Route path="/external-data/:id"   element={<DatasetDetail />} />
                  <Route path="/feature-table"       element={<FeatureTable />} />
                  <Route path="/feature-table/:id"   element={<FeatureTableDetail />} />
                  <Route path="/policies"            element={<Policies />} />
                  <Route path="/policies/:id"        element={<PolicyDetail />} />
                  <Route path="/model-factory"       element={<ModelFactory />} />
                  <Route path="/model-factory/:name" element={<ModelDetail />} />
                  <Route path="/reports"             element={<Reports />} />
                  <Route path="/reports/:id"         element={<ReportDetail />} />
                  <Route path="/serving"             element={<Serving />} />
                  <Route path="/monitoring"          element={<Monitoring />} />
                  <Route path="/governance"          element={<Governance />} />
                  <Route path="/quote-review"        element={<QuoteReview />} />
                </Routes>
              </div>
            </main>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(
        <HashRouter>
          <App />
        </HashRouter>
      );
    </script>
  </body>
</html>
