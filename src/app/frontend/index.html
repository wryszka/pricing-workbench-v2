<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing Workbench v2 — Bricksurance SE</title>

    <!-- Tailwind via CDN (JIT in-browser, supports arbitrary utility classes). -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { sidebar: "#1e293b", sidebarAccent: "#334155" },
          },
        },
      };
    </script>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: #f8fafc; }
      .md-report h1 { font-size: 1.5rem; font-weight: 600; color: #0f172a; margin-top: 1.5rem; margin-bottom: 0.75rem; }
      .md-report h2 { font-size: 1.25rem; font-weight: 600; color: #1e293b; margin-top: 1.5rem; margin-bottom: 0.5rem; }
      .md-report h3 { font-size: 1rem; font-weight: 600; color: #334155; margin-top: 1rem; margin-bottom: 0.5rem; }
      .md-report p  { color: #334155; line-height: 1.6; margin: 0.5rem 0; }
      .md-report ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; color: #334155; }
      .md-report li { margin: 0.25rem 0; }
      .md-report table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.75rem; }
      .md-report th { background: #f1f5f9; text-align: left; padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; font-weight: 500; }
      .md-report td { padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; }
      .md-report code { background: #f1f5f9; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: ui-monospace, Menlo, monospace; font-size: 0.875rem; }
      .md-report a { color: #2563eb; }
      .md-report a:hover { text-decoration: underline; }
      .md-report img { max-width: 100%; border-radius: 0.375rem; border: 1px solid #e2e8f0; margin: 0.75rem 0; background: #fff; }
      .md-report strong { color: #0f172a; font-weight: 600; }
    </style>

    <!-- esm.sh pins React + Router + Markdown + Lucide. All buildless. -->
    <script type="importmap">
      {
        "imports": {
          "react":              "https://esm.sh/react@18.3.1",
          "react-dom":          "https://esm.sh/react-dom@18.3.1",
          "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client",
          "react/jsx-runtime":  "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-router-dom":   "https://esm.sh/react-router-dom@6.28.0?deps=react@18.3.1,react-dom@18.3.1",
          "lucide-react":       "https://esm.sh/lucide-react@0.474.0?deps=react@18.3.1",
          "react-markdown":     "https://esm.sh/react-markdown@9.0.3?deps=react@18.3.1",
          "remark-gfm":         "https://esm.sh/remark-gfm@4.0.0"
        }
      }
    </script>

    <!-- Babel Standalone: transforms the inline <script type="text/babel"> below so we can
         write JSX directly. No npm, no bundler. ~110KB, one-time cost. -->
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
      // -----------------------------------------------------------------
      // Pricing Workbench v2 — single-file React SPA, buildless via Babel
      // -----------------------------------------------------------------
      import React, { useEffect, useState } from "react";
      import { createRoot } from "react-dom/client";
      import {
        HashRouter, Routes, Route, Link, NavLink, useParams,
      } from "react-router-dom";
      import ReactMarkdown from "react-markdown";
      import remarkGfm from "remark-gfm";
      import {
        Database, FlaskConical, Boxes, FileText, Rocket, Activity,
        Shield, Zap, LineChart, BookOpen, ArrowRight, ArrowLeft,
        ChevronRight, Trophy, CheckCircle2, XCircle, Clock, Download,
        AlertTriangle, Gauge, GitBranch, Layers, Scale, Search,
        ShieldCheck, TrendingUp, Info, Network, Sparkles, Target,
      } from "lucide-react";

      // ---------- fetch wrapper ----------
      async function api(path, init) {
        const r = await fetch(path.startsWith("/") ? path : `/api/${path}`, {
          headers: { "Content-Type": "application/json" }, ...init,
        });
        if (!r.ok) throw new Error(`${r.status}: ${await r.text().catch(() => r.statusText)}`);
        return r.json();
      }
      const fmt  = (n) => (n === null || n === undefined) ? "—" : Number(n).toLocaleString();
      const pct  = (n, d = 1) => (n === null || n === undefined) ? "—" : `${(Number(n) * 100).toFixed(d)}%`;

      // ---------- shared components ----------
      function SidebarUser() {
        const [me, setMe] = useState(null);
        useEffect(() => { api("me").then(setMe).catch(() => {}); }, []);
        if (!me) return null;
        return (
          <div className="px-3 py-2 border-t border-slate-700 text-[11px] text-slate-300">
            <div className="truncate">Signed in as</div>
            <div className="truncate text-white">{me.email}</div>
          </div>
        );
      }

      function Sidebar() {
        const NAV = [
          { to: "/",              label: "Home",               icon: LineChart },
          { to: "/external-data", label: "Ingestion",           icon: Database },
          { to: "/feature-table", label: "Feature Table",      icon: Boxes },
          { to: "/policies",      label: "Policies",           icon: BookOpen },
          { to: "/development",   label: "Model Development",  icon: Sparkles },
          { to: "/model-factory", label: "Model Factory",      icon: FlaskConical },
          { to: "/reports",       label: "Regulatory Reports", icon: FileText },
          { to: "/serving",       label: "Serving",            icon: Rocket },
          { to: "/monitoring",    label: "Monitoring",         icon: Activity },
          { to: "/governance",    label: "Governance",         icon: Shield },
          { to: "/quote-review",  label: "Quote Review",       icon: Zap },
        ];
        return (
          <aside className="w-56 shrink-0 bg-sidebar text-slate-200 flex flex-col min-h-screen">
            <div className="p-4 border-b border-slate-700">
              <div className="font-semibold text-white">Pricing Workbench</div>
              <div className="text-xs text-slate-400 mt-0.5">v2 — Bricksurance SE</div>
            </div>
            <nav className="flex-1 p-2 space-y-0.5">
              {NAV.map(({ to, label, icon: Icon }) => (
                <NavLink key={to} to={to} end={to === "/"}
                  className={({ isActive }) =>
                    "flex items-center gap-2 px-3 py-2 rounded text-sm transition " +
                    (isActive ? "bg-blue-600 text-white" : "hover:bg-sidebarAccent text-slate-300")
                  }>
                  <Icon size={16} /><span>{label}</span>
                </NavLink>
              ))}
            </nav>
            <SidebarUser />
            <div className="p-3 border-t border-slate-700 text-[10px] text-slate-500 leading-relaxed">
              Not a Databricks product — a demonstration of platform capabilities. Synthetic data.
              {" "}<a className="text-blue-400 hover:underline" href="https://github.com/wryszka/pricing-workbench-v2" target="_blank" rel="noreferrer">Source on GitHub ↗</a>
            </div>
          </aside>
        );
      }

      function PageHeader({ title, subtitle, actions }) {
        return (
          <div className="mb-6 flex items-start justify-between gap-4">
            <div>
              <h1 className="text-2xl font-semibold text-slate-900">{title}</h1>
              {subtitle && <p className="text-slate-600 text-sm mt-1">{subtitle}</p>}
            </div>
            {actions && <div className="flex items-center gap-2">{actions}</div>}
          </div>
        );
      }

      function Card({ title, right, children, className = "" }) {
        return (
          <div className={`bg-white rounded-lg border border-slate-200 ${className}`}>
            {(title || right) && (
              <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-3">
                {title && <h3 className="font-medium text-slate-800">{title}</h3>}
                {right}
              </div>
            )}
            <div className="p-4">{children}</div>
          </div>
        );
      }

      function StatNumber({ value, label, hint }) {
        return (
          <div>
            <div className="text-2xl font-semibold text-slate-900">{value}</div>
            <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">{label}</div>
            {hint && <div className="text-xs text-slate-400 mt-0.5">{hint}</div>}
          </div>
        );
      }

      function Badge({ children, tone = "slate" }) {
        const tones = {
          slate: "bg-slate-100 text-slate-700 border-slate-200",
          green: "bg-emerald-50 text-emerald-700 border-emerald-200",
          amber: "bg-amber-50 text-amber-700 border-amber-200",
          red:   "bg-red-50 text-red-700 border-red-200",
          blue:  "bg-blue-50 text-blue-700 border-blue-200",
        };
        return (
          <span className={`inline-flex items-center px-2 py-0.5 text-[11px] rounded border ${tones[tone]}`}>
            {children}
          </span>
        );
      }

      function InfoBanner({ icon: Icon = Info, tone = "blue", title, children }) {
        const tones = {
          blue:   "bg-blue-50 border-blue-200 text-blue-900 [&_strong]:text-blue-950",
          amber:  "bg-amber-50 border-amber-200 text-amber-900",
          emerald:"bg-emerald-50 border-emerald-200 text-emerald-900",
          slate:  "bg-slate-50 border-slate-200 text-slate-800",
        };
        return (
          <div className={`border rounded-lg p-4 mb-6 flex items-start gap-3 ${tones[tone]}`}>
            <div className="shrink-0 mt-0.5"><Icon size={18} /></div>
            <div className="text-sm leading-relaxed flex-1">
              {title && <div className="font-medium mb-1">{title}</div>}
              {children}
            </div>
          </div>
        );
      }

      function FeatureBadge({ children }) {
        return <span className="inline-block text-[10px] bg-white/70 border border-current/20 rounded px-1.5 py-0.5 mr-1 mb-1">{children}</span>;
      }

      // Tiny SVG bar chart — horizontal bars, label on left, value on right.
      function BarChart({ data, unit = "", color = "#3b82f6", maxWidth = 360 }) {
        if (!data || data.length === 0) return <div className="text-xs text-slate-500 italic">No data</div>;
        const max = Math.max(...data.map((d) => d.value), 1);
        return (
          <div className="space-y-1.5">
            {data.map((d) => {
              const w = (d.value / max) * maxWidth;
              return (
                <div key={d.label} className="flex items-center gap-2 text-xs">
                  <div className="w-36 truncate text-slate-700">{d.label}</div>
                  <div className="flex-1 relative h-4 bg-slate-100 rounded">
                    <div className="absolute left-0 top-0 h-4 rounded" style={{ width: `${(d.value / max) * 100}%`, backgroundColor: color }} />
                  </div>
                  <div className="w-20 text-right font-mono text-slate-700">{typeof d.value === "number" ? d.value.toLocaleString() : d.value}{unit}</div>
                </div>
              );
            })}
          </div>
        );
      }

      // Claude-powered agent widget: a button that fires a POST to /api/agent/<kind>
      // and renders the result + an expandable transparency panel (system/user prompt,
      // tokens, latency). Drops onto any page. Uses Databricks Foundation Models, so
      // the "Model" badge shows the actual endpoint name.
      function AgentWidget({ kind, title, subtitle, buttonLabel, body = {}, onResultExtract }) {
        const [state, setState] = useState("idle"); // idle | running | done | error
        const [result, setResult] = useState(null);
        const [showTrace, setShowTrace] = useState(false);
        const [err, setErr] = useState(null);

        async function run() {
          setState("running"); setErr(null); setResult(null);
          try {
            const r = await api(`agent/${kind}`, { method: "POST", body: JSON.stringify(body) });
            setResult(r); setState("done");
          } catch (e) {
            setErr(String(e)); setState("error");
          }
        }

        const extracted = result && onResultExtract ? onResultExtract(result) : null;

        return (
          <div className="bg-gradient-to-br from-violet-50 to-indigo-50 border border-violet-200 rounded-lg p-4">
            <div className="flex items-start justify-between gap-3 mb-3">
              <div className="flex items-start gap-2">
                <div className="p-1.5 rounded bg-violet-100 text-violet-700 shrink-0 mt-0.5"><Sparkles size={14} /></div>
                <div>
                  <div className="font-medium text-slate-900 text-sm">{title}</div>
                  {subtitle && <div className="text-xs text-slate-600 mt-0.5">{subtitle}</div>}
                  <div className="text-[11px] text-slate-500 mt-1">Powered by Mosaic AI Agent Bricks · <code>databricks-claude-sonnet-4-6</code></div>
                </div>
              </div>
              <button onClick={run} disabled={state === "running"}
                className="bg-violet-600 hover:bg-violet-700 disabled:opacity-50 text-white px-3 py-1.5 rounded text-sm flex items-center gap-1 shrink-0">
                <Sparkles size={14} />
                {state === "running" ? "Running…" : buttonLabel}
              </button>
            </div>
            {err && <div className="text-red-700 text-xs mt-2 bg-red-50 border border-red-200 rounded p-2">{err}</div>}
            {result && (
              <div className="mt-2">
                <div className="bg-white border border-slate-200 rounded p-3 md-report text-slate-800">
                  <ReactMarkdown remarkPlugins={[remarkGfm]}>{result.content || ""}</ReactMarkdown>
                </div>
                <div className="flex items-center gap-3 text-[11px] text-slate-500 mt-2">
                  <span>Model: <code>{result.model}</code></span>
                  <span>· Tokens: {result.prompt_tokens} in / {result.completion_tokens} out</span>
                  <span>· {result.latency_ms} ms</span>
                  <button onClick={() => setShowTrace((s) => !s)} className="text-violet-700 hover:underline ml-auto">
                    {showTrace ? "Hide" : "Show"} transparency trace
                  </button>
                </div>
                {showTrace && (
                  <div className="mt-2 space-y-2">
                    <details className="bg-white border border-slate-200 rounded p-2" open>
                      <summary className="text-xs font-medium text-slate-700 cursor-pointer">System prompt</summary>
                      <pre className="text-[11px] text-slate-600 whitespace-pre-wrap mt-2">{result.system_prompt}</pre>
                    </details>
                    <details className="bg-white border border-slate-200 rounded p-2">
                      <summary className="text-xs font-medium text-slate-700 cursor-pointer">User prompt</summary>
                      <pre className="text-[11px] text-slate-600 whitespace-pre-wrap mt-2 max-h-64 overflow-auto">{result.user_prompt}</pre>
                    </details>
                    <div className="text-[11px] text-slate-500 italic">This call is logged to <code>app_audit_log</code> with event_type <code>agent_{kind}</code>.</div>
                  </div>
                )}
              </div>
            )}
            {extracted}
          </div>
        );
      }

      // Rich impact analysis for geo_hazard — candidate simulation, distribution,
      // per-region/division breakdown, flagged policies. Mirrors v1's layout but
      // built directly on /api/datasets/geo_hazard/impact which rescores every
      // 2024 policy in a single SQL scan.
      function GeoHazardImpact({ impact }) {
        const s = impact.summary;
        const totalSign = s.total_delta >= 0 ? "+" : "";
        const increasedPct = s.affected_policies > 0 ? (s.n_increased / s.affected_policies) : 0;
        return (
          <div className="space-y-6">
            <InfoBanner icon={AlertTriangle} tone="amber" title="Candidate dataset scenario">
              <p className="mb-2">{impact.scenario.description}</p>
              <p className="text-xs"><strong>Pricing rule:</strong> {impact.scenario.pricing_rule}</p>
              <p className="text-xs"><strong>Reproducibility:</strong> {impact.scenario.deterministic}</p>
            </InfoBanner>

            {/* ---------- Portfolio summary ---------- */}
            <div>
              <h4 className="font-medium text-slate-800 mb-2">Portfolio-level bottom line</h4>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <Card>
                  <StatNumber value={fmt(s.total_policies)} label="Policies in book (2024)" />
                </Card>
                <Card>
                  <div className="text-2xl font-semibold text-slate-900">{fmt(s.affected_policies)}</div>
                  <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">Policies re-rated</div>
                  <div className="text-xs text-slate-400 mt-0.5">{pct(s.affected_pct, 2)} of book</div>
                </Card>
                <Card>
                  <div className="text-2xl font-semibold text-slate-900">£{fmt(Math.round(s.current_premium))}</div>
                  <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">Current premium</div>
                  <div className="text-xs text-slate-400 mt-0.5">against current geo_hazard</div>
                </Card>
                <Card>
                  <div className={`text-2xl font-semibold ${s.total_delta >= 0 ? "text-amber-700" : "text-emerald-700"}`}>
                    {totalSign}£{fmt(Math.round(s.total_delta))}
                  </div>
                  <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">Portfolio Δ</div>
                  <div className="text-xs text-slate-400 mt-0.5">
                    {pct(s.total_delta_pct, 2)} bottom-line impact
                  </div>
                </Card>
                <Card>
                  <StatNumber value={fmt(s.n_increased)} label="Policies re-rated UP" hint={`${pct(increasedPct, 0)} of affected`} />
                </Card>
                <Card>
                  <StatNumber value={fmt(s.n_decreased)} label="Policies re-rated DOWN" />
                </Card>
                <Card>
                  <div className="text-2xl font-semibold text-red-700">{fmt(s.flagged_over_10pct)}</div>
                  <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">Flagged (&gt;10% change)</div>
                  <div className="text-xs text-slate-400 mt-0.5">actuary-sensitive</div>
                </Card>
                <Card>
                  <div className="text-2xl font-semibold text-slate-900">£{fmt(Math.round(s.candidate_premium))}</div>
                  <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">Candidate premium</div>
                  <div className="text-xs text-slate-400 mt-0.5">if approved</div>
                </Card>
              </div>
            </div>

            {/* ---------- Distribution histogram ---------- */}
            <Card title="Distribution — % change per policy"
              right={<div className="text-xs text-slate-500">{fmt(s.total_policies - s.affected_policies)} policies unchanged</div>}>
              <BarChart
                data={(impact.distribution || []).map((b) => ({ label: b.bucket, value: Number(b.n || 0) }))}
                color="#8b5cf6" />
            </Card>

            {/* ---------- Postcode-level changes ---------- */}
            <Card title={`Postcode sectors that changed (top ${impact.postcode_changes?.length || 0} by £ impact)`}
              right={<Badge tone="slate">source-level diff</Badge>}>
              <Table
                columns={[
                  { key: "postcode_sector",   label: "Postcode sector", className: "font-mono text-xs" },
                  { key: "current_flood",     label: "Current zone" },
                  { key: "candidate_flood",   label: "Candidate zone" },
                  { key: "flood_delta",       label: "Δ", render: (r) => (
                    <Badge tone={r.flood_delta > 0 ? "amber" : "emerald"}>
                      {r.flood_delta > 0 ? "+" : ""}{r.flood_delta}
                    </Badge>
                  ) },
                  { key: "policies_in_sector",label: "Policies affected", render: (r) => fmt(r.policies_in_sector) },
                  { key: "sector_delta",      label: "£ impact", render: (r) => (
                    <span className={r.sector_delta >= 0 ? "text-amber-700" : "text-emerald-700"}>
                      {r.sector_delta >= 0 ? "+" : ""}£{fmt(Math.round(r.sector_delta))}
                    </span>
                  ) },
                ]}
                rows={impact.postcode_changes || []} />
            </Card>

            {/* ---------- Per-region impact ---------- */}
            <Card title="Impact by region">
              <Table
                columns={[
                  { key: "region", label: "Region", className: "font-medium" },
                  { key: "n_policies", label: "Policies", render: (r) => fmt(r.n_policies) },
                  { key: "n_affected", label: "Affected", render: (r) => fmt(r.n_affected) },
                  { key: "current_premium",  label: "Current £",   render: (r) => `£${fmt(Math.round(r.current_premium || 0))}` },
                  { key: "candidate_premium",label: "Candidate £", render: (r) => `£${fmt(Math.round(r.candidate_premium || 0))}` },
                  { key: "delta", label: "Δ £", render: (r) => (
                    <span className={r.delta >= 0 ? "text-amber-700" : "text-emerald-700"}>
                      {r.delta >= 0 ? "+" : ""}£{fmt(Math.round(r.delta || 0))}
                    </span>
                  ) },
                  { key: "delta_pct", label: "Δ %", render: (r) => (
                    <span className={r.delta >= 0 ? "text-amber-700" : "text-emerald-700"}>
                      {pct(r.current_premium ? r.delta / r.current_premium : 0, 2)}
                    </span>
                  ) },
                ]}
                rows={impact.per_region || []} />
            </Card>

            {/* ---------- Per-division impact (class of business) ---------- */}
            <Card title="Impact by SIC division (class of business)">
              <Table
                columns={[
                  { key: "division", label: "Division", className: "font-medium" },
                  { key: "n_policies", label: "Policies", render: (r) => fmt(r.n_policies) },
                  { key: "n_affected", label: "Affected", render: (r) => fmt(r.n_affected) },
                  { key: "current_premium",  label: "Current £",   render: (r) => `£${fmt(Math.round(r.current_premium || 0))}` },
                  { key: "candidate_premium",label: "Candidate £", render: (r) => `£${fmt(Math.round(r.candidate_premium || 0))}` },
                  { key: "delta", label: "Δ £", render: (r) => (
                    <span className={r.delta >= 0 ? "text-amber-700" : "text-emerald-700"}>
                      {r.delta >= 0 ? "+" : ""}£{fmt(Math.round(r.delta || 0))}
                    </span>
                  ) },
                ]}
                rows={impact.per_division || []} />
            </Card>

            {/* ---------- Flagged policies ---------- */}
            <Card title={`Policies with biggest £ movement (top ${impact.flagged_policies?.length || 0})`}
              right={<Badge tone="red">for underwriter review</Badge>}>
              <Table
                columns={[
                  { key: "policy_id", label: "Policy", render: (r) => (
                    <Link to={`/policies/${r.policy_id}`} className="text-blue-600 hover:underline font-mono text-xs">{r.policy_id}</Link>
                  ) },
                  { key: "company_name",    label: "Company" },
                  { key: "postcode_sector", label: "Sector",  className: "font-mono text-xs" },
                  { key: "region",          label: "Region" },
                  { key: "flood_zone",      label: "Flood", render: (r) => `${r.current_flood} → ${r.candidate_flood}` },
                  { key: "current_premium", label: "Current £",   render: (r) => `£${fmt(Math.round(r.current_premium || 0))}` },
                  { key: "candidate_premium",label:"Candidate £", render: (r) => `£${fmt(Math.round(r.candidate_premium || 0))}` },
                  { key: "delta", label: "Δ £", render: (r) => (
                    <span className={r.delta >= 0 ? "text-amber-700" : "text-emerald-700"}>
                      {r.delta >= 0 ? "+" : ""}£{fmt(Math.round(r.delta || 0))}
                    </span>
                  ) },
                ]}
                rows={impact.flagged_policies || []} />
            </Card>

            {/* ---------- AI explain ---------- */}
            <AgentWidget
              kind="dq_monitor"
              title="AI impact summary for the actuary"

        const [tab, setTab] = useState("diff");

        const [err, setErr] = useState(null);
        const [quality, setQuality] = useState(null);
        const [diff, setDiff]       = useState(null);
        const [impact, setImpact]   = useState(null);
        const reload = () => {
          api(`datasets/${id}`).then(setData).catch((e) => setErr(String(e)));
          api(`datasets/${id}/approvals`).then((r) => setApprovals(r.approvals)).catch(() => {});
          api("me").then(setMe).catch(() => {});
        };
        useEffect(reload, [id]);
        useEffect(() => {
          if (tab === "quality" && !quality) api(`datasets/${id}/quality`).then(setQuality).catch(() => {});
          if (tab === "diff"    && !diff)    api(`datasets/${id}/diff`).then(setDiff).catch(() => {});
          if (tab === "impact"  && !impact)  api(`datasets/${id}/impact`).then(setImpact).catch(() => {});
        }, [tab, id]);

        async function submitDecision(decision) {
          try {
            await api(`datasets/${id}/approve`, { method: "POST", body: JSON.stringify({ decision, notes }) });
            setFlash(`Recorded ${decision}`);
            setNotes("");
            setTimeout(() => setFlash(null), 3000);
            reload();

      function ModelDevelopment() {
        const [comparison, setComparison] = useState([]);
        useEffect(() => { api("models/comparison").then((r) => setComparison(r.rows || [])).catch(() => {}); }, []);

        const notebooks = [
          { id: "01", name: "Frequency GLM",          path: "src/05_modelling/01_train_frequency_glm.py",
            desc: "Poisson GLM with log(exposure_fraction) offset. Additive relativities, p-values, deviance — the transparent baseline every regulator expects.",
            topics: ["statsmodels", "Poisson GLM", "offset", "relativities", "MLflow", "UC registry"] },
          { id: "02", name: "Severity GLM",           path: "src/05_modelling/02_train_severity_glm.py",
            desc: "Gamma GLM on mean severity where claims > 0, claim-count-weighted. Coefficients × exponents = cost relativities.",
            topics: ["statsmodels", "Gamma GLM", "freq_weights", "log link", "relativities"] },
          { id: "03", name: "Severity GBM (challenger)", path: "src/05_modelling/03_train_severity_gbm.py",
            desc: "LightGBM Gamma with actuarial monotonicity constraints on 11 features. Same target + split as the GLM for a clean like-for-like.",
            topics: ["LightGBM", "Gamma objective", "monotone_constraints", "early stopping", "TreeSHAP-ready"] },
          { id: "04", name: "Demand GBM",             path: "src/05_modelling/04_train_demand_gbm.py",
            desc: "Binary classifier on converted_flag over 4-year quote stream. Temporal split. Outputs the conversion-probability leg of the pricing engine.",
            topics: ["LightGBM", "binary", "AUC", "price elasticity", "temporal split"] },
          { id: "05", name: "Bayesian frequency (PyMC)", path: "src/05_modelling/05_train_frequency_pymc.py",
            desc: "PyMC hierarchical Poisson with partial pooling on region. Full posterior distributions useful for capital + tail risk. Research artefact, not registered.",
            topics: ["PyMC", "NUTS", "partial pooling", "posterior", "ArviZ"] },
          { id: "06", name: "Pure-premium XGBoost",   path: "src/05_modelling/06_train_pure_premium_xgboost.py",
            desc: "Single-model Tweedie alternative to the compound freq × sev approach. Monotonicity constraints. Tradeoff: higher AIC, less interpretable.",
            topics: ["XGBoost", "Tweedie", "variance_power=1.5", "monotone_constraints"] },
          { id: "07", name: "Model factory",          path: "src/05_modelling/07_model_factory.py",
            desc: "Scores every candidate on the 2024 test slice, writes model_comparison, aliases champions in UC, and emits double-lift charts.",
            topics: ["champion/challenger", "double-lift", "UC aliases", "model_comparison"] },

            desc: "Cross-model audit: protected-attribute absence, directional monotonicity across 9 features, postcode-swap consistency test.",
            topics: ["fairness", "monotonicity", "same-risk consistency", "cross-slice"] },
        ];

        return (
          <>
            <PageHeader title="Model Development" subtitle="The 9 notebooks that make up the factory. Together they produce the champions aliased in UC and the regulatory reports." />

                        <div><div className="text-[10px] uppercase text-slate-500">Buildings SI</div><div className="font-medium">£{fmt(Math.round(detail.quote.buildings_si || 0))}</div></div>
                        <div><div className="text-[10px] uppercase text-slate-500">Gross premium</div><div className="font-medium">£{fmt(Math.round(detail.quote.gross_premium_quoted || 0))}</div></div>
                        <div><div className="text-[10px] uppercase text-slate-500">Market rate</div><div className="font-medium">{Number(detail.quote.market_median_rate || 0).toFixed(2)}</div></div>
                        <div><div className="text-[10px] uppercase text-slate-500">vs market</div>
                          <div className={`font-medium ${Number(detail.quote.vs_market_rate) > 1.1 ? "text-red-600" : Number(detail.quote.vs_market_rate) < 0.9 ? "text-emerald-700" : "text-slate-800"}`}>
                            {Number(detail.quote.vs_market_rate || 0).toFixed(2)}
                          </div>
                        </div>
                        <div><div className="text-[10px] uppercase text-slate-500">Internal risk tier</div><div className="font-medium">{detail.quote.internal_risk_tier}</div></div>
                        <div><div className="text-[10px] uppercase text-slate-500">Credit tier</div><div className="font-medium">{detail.quote.credit_risk_tier}</div></div>
                        <div><div className="text-[10px] uppercase text-slate-500">Flood zone</div><div className="font-medium">{detail.quote.flood_zone}</div></div>
                        <div><div className="text-[10px] uppercase text-slate-500">Channel</div><div className="font-medium">{detail.quote.channel}</div></div>
                      </div>
                    </Card>

                    {detail.policy && (
                      <Card title="Became policy">
                        <div className="flex items-center justify-between">
                          <div>
                            <Link to={`/policies/${detail.policy.policy_id}`} className="text-blue-600 hover:underline font-mono text-sm">{detail.policy.policy_id}</Link>
                            <div className="text-xs text-slate-500 mt-0.5">{detail.policy.company_name} · {detail.policy.region}</div>
                          </div>
                          <Badge tone={detail.policy.status === "active" ? "green" : "amber"}>{detail.policy.status}</Badge>
                        </div>
                      </Card>
                    )}

                    <AgentWidget
                      kind="explain_pricing"
                      title="AI explanation of this quote's price"
                      subtitle={`Claude reviews every rating factor the engine saw for ${detail.quote.quote_id} and drafts a one-paragraph underwriter explanation.`}
                      buttonLabel="Explain"
                      body={{ quote_id: detail.quote.quote_id }} />

                    <Card title="Rating factors JSON (model input)">
                      <pre className="text-[11px] bg-slate-50 border border-slate-200 rounded p-3 overflow-auto max-h-64">
                        {JSON.stringify(detail.quote, null, 2)}
                      </pre>
                    </Card>
                  </div>
                )}
              </div>
            </div>
          </>
        );
      }

      // Class component only so we can use componentDidCatch. Wraps <Routes> so a
      // render error on one page renders a readable message instead of a blank screen.
      class ErrorBoundary extends React.Component {
        constructor(p) { super(p); this.state = { err: null }; }
        static getDerivedStateFromError(err) { return { err }; }
        componentDidCatch(err, info) { console.error(err, info); }
        render() {
          if (!this.state.err) return this.props.children;
          return (
            <div className="bg-red-50 border border-red-200 rounded p-4 text-sm text-red-900">
              <div className="font-medium mb-1">Something broke on this page</div>
              <pre className="text-xs whitespace-pre-wrap">{String(this.state.err?.stack || this.state.err)}</pre>
              <button onClick={() => this.setState({ err: null })}
                className="mt-3 bg-red-600 text-white px-2 py-1 rounded text-xs">Dismiss</button>
            </div>
          );
        }
      }

      // ---------- app shell ----------
      function App() {
        return (
          <div className="flex min-h-screen">
            <Sidebar />
            <main className="flex-1 overflow-x-hidden">
              <div className="max-w-7xl mx-auto px-6 py-8">
                <ErrorBoundary>
                <Routes>
                  <Route path="/"                    element={<Home />} />
                  <Route path="/external-data"       element={<ExternalData />} />
                  <Route path="/external-data/:id"   element={<DatasetDetail />} />
                  <Route path="/feature-table"       element={<FeatureTable />} />
                  <Route path="/feature-table/:id"   element={<FeatureTableDetail />} />
                  <Route path="/policies"            element={<Policies />} />
                  <Route path="/policies/:id"        element={<PolicyDetail />} />
                  <Route path="/development"         element={<ModelDevelopment />} />
                  <Route path="/model-factory"       element={<ModelFactory />} />
                  <Route path="/model-factory/:name" element={<ModelDetail />} />
                  <Route path="/reports"             element={<Reports />} />
                  <Route path="/reports/:id"         element={<ReportDetail />} />
                  <Route path="/serving"             element={<Serving />} />
                  <Route path="/monitoring"          element={<Monitoring />} />
                  <Route path="/governance"          element={<Governance />} />
                  <Route path="/quote-review"        element={<QuoteReview />} />
                </Routes>
                </ErrorBoundary>
              </div>
            </main>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(
        <HashRouter>
          <App />
        </HashRouter>
      );
    </script>
  </body>
</html>
