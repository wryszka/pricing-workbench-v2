<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing Workbench v2 — Bricksurance SE</title>

    <!-- Tailwind via CDN (JIT in-browser, supports arbitrary utility classes). -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { sidebar: "#1e293b", sidebarAccent: "#334155" },
          },
        },
      };
    </script>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: #f8fafc; }
      .md-report h1 { font-size: 1.5rem; font-weight: 600; color: #0f172a; margin-top: 1.5rem; margin-bottom: 0.75rem; }
      .md-report h2 { font-size: 1.25rem; font-weight: 600; color: #1e293b; margin-top: 1.5rem; margin-bottom: 0.5rem; }
      .md-report h3 { font-size: 1rem; font-weight: 600; color: #334155; margin-top: 1rem; margin-bottom: 0.5rem; }
      .md-report p  { color: #334155; line-height: 1.6; margin: 0.5rem 0; }
      .md-report ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; color: #334155; }
      .md-report li { margin: 0.25rem 0; }
      .md-report table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.75rem; }
      .md-report th { background: #f1f5f9; text-align: left; padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; font-weight: 500; }
      .md-report td { padding: 0.25rem 0.5rem; border: 1px solid #e2e8f0; }
      .md-report code { background: #f1f5f9; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: ui-monospace, Menlo, monospace; font-size: 0.875rem; }
      .md-report a { color: #2563eb; }
      .md-report a:hover { text-decoration: underline; }
      .md-report img { max-width: 100%; border-radius: 0.375rem; border: 1px solid #e2e8f0; margin: 0.75rem 0; background: #fff; }
      .md-report strong { color: #0f172a; font-weight: 600; }
    </style>

    <!-- esm.sh pins React + Router + Markdown + Lucide. All buildless. -->
    <script type="importmap">
      {
        "imports": {
          "react":              "https://esm.sh/react@18.3.1",
          "react-dom":          "https://esm.sh/react-dom@18.3.1",
          "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client",
          "react/jsx-runtime":  "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-router-dom":   "https://esm.sh/react-router-dom@6.28.0?deps=react@18.3.1,react-dom@18.3.1",
          "lucide-react":       "https://esm.sh/lucide-react@0.474.0?deps=react@18.3.1",
          "react-markdown":     "https://esm.sh/react-markdown@9.0.3?deps=react@18.3.1",
          "remark-gfm":         "https://esm.sh/remark-gfm@4.0.0"
        }
      }
    </script>

    <!-- Babel Standalone: transforms the inline <script type="text/babel"> below so we can
         write JSX directly. No npm, no bundler. ~110KB, one-time cost. -->
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
      // -----------------------------------------------------------------
      // Pricing Workbench v2 — single-file React SPA, buildless via Babel
      // -----------------------------------------------------------------
      import React, { useEffect, useState } from "react";
      import { createRoot } from "react-dom/client";
      import {
        HashRouter, Routes, Route, Link, NavLink, useParams,
      } from "react-router-dom";
      import ReactMarkdown from "react-markdown";
      import remarkGfm from "remark-gfm";
      import {
        Database, FlaskConical, Boxes, FileText, Rocket, Activity,
        Shield, Zap, LineChart, BookOpen, ArrowRight, ArrowLeft,
        ChevronRight, Trophy, CheckCircle2, XCircle, Clock, Download,
        AlertTriangle, Gauge, GitBranch, Layers, Scale, Search,
        ShieldCheck, TrendingUp, Info, Network, Sparkles, Target,
      } from "lucide-react";

      // ---------- fetch wrapper ----------
      async function api(path, init) {
        const r = await fetch(path.startsWith("/") ? path : `/api/${path}`, {
          headers: { "Content-Type": "application/json" }, ...init,
        });
        if (!r.ok) throw new Error(`${r.status}: ${await r.text().catch(() => r.statusText)}`);
        return r.json();
      }
      const fmt  = (n) => (n === null || n === undefined) ? "—" : Number(n).toLocaleString();
      const pct  = (n, d = 1) => (n === null || n === undefined) ? "—" : `${(Number(n) * 100).toFixed(d)}%`;

      // ---------- shared components ----------
      function Sidebar() {
        const NAV = [
          { to: "/",              label: "Home",               icon: LineChart },
          { to: "/external-data", label: "External Data",      icon: Database },
          { to: "/feature-table", label: "Feature Table",      icon: Boxes },
          { to: "/policies",      label: "Policies",           icon: BookOpen },
          { to: "/model-factory", label: "Model Factory",      icon: FlaskConical },
          { to: "/reports",       label: "Regulatory Reports", icon: FileText },
          { to: "/serving",       label: "Serving",            icon: Rocket },
          { to: "/monitoring",    label: "Monitoring",         icon: Activity },
          { to: "/governance",    label: "Governance",         icon: Shield },
          { to: "/quote-review",  label: "Quote Review",       icon: Zap },
        ];
        return (
          <aside className="w-56 shrink-0 bg-sidebar text-slate-200 flex flex-col min-h-screen">
            <div className="p-4 border-b border-slate-700">
              <div className="font-semibold text-white">Pricing Workbench</div>
              <div className="text-xs text-slate-400 mt-0.5">v2 — Bricksurance SE</div>
            </div>
            <nav className="flex-1 p-2 space-y-0.5">
              {NAV.map(({ to, label, icon: Icon }) => (
                <NavLink key={to} to={to} end={to === "/"}
                  className={({ isActive }) =>
                    "flex items-center gap-2 px-3 py-2 rounded text-sm transition " +
                    (isActive ? "bg-blue-600 text-white" : "hover:bg-sidebarAccent text-slate-300")
                  }>
                  <Icon size={16} /><span>{label}</span>
                </NavLink>
              ))}
            </nav>
            <div className="p-3 border-t border-slate-700 text-[11px] text-slate-500">
              Actuary-accurate pricing pipeline · regulator-ready reports
            </div>
          </aside>
        );
      }

      function PageHeader({ title, subtitle, actions }) {
        return (
          <div className="mb-6 flex items-start justify-between gap-4">
            <div>
              <h1 className="text-2xl font-semibold text-slate-900">{title}</h1>
              {subtitle && <p className="text-slate-600 text-sm mt-1">{subtitle}</p>}
            </div>
            {actions && <div className="flex items-center gap-2">{actions}</div>}
          </div>
        );
      }

      function Card({ title, right, children, className = "" }) {
        return (
          <div className={`bg-white rounded-lg border border-slate-200 ${className}`}>
            {(title || right) && (
              <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-3">
                {title && <h3 className="font-medium text-slate-800">{title}</h3>}
                {right}
              </div>
            )}
            <div className="p-4">{children}</div>
          </div>
        );
      }

      function StatNumber({ value, label, hint }) {
        return (
          <div>
            <div className="text-2xl font-semibold text-slate-900">{value}</div>
            <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">{label}</div>
            {hint && <div className="text-xs text-slate-400 mt-0.5">{hint}</div>}
          </div>
        );
      }

      function Badge({ children, tone = "slate" }) {
        const tones = {
          slate: "bg-slate-100 text-slate-700 border-slate-200",
          green: "bg-emerald-50 text-emerald-700 border-emerald-200",
          amber: "bg-amber-50 text-amber-700 border-amber-200",
          red:   "bg-red-50 text-red-700 border-red-200",
          blue:  "bg-blue-50 text-blue-700 border-blue-200",
        };
        return (
          <span className={`inline-flex items-center px-2 py-0.5 text-[11px] rounded border ${tones[tone]}`}>
            {children}
          </span>
        );
      }

      function InfoBanner({ icon: Icon = Info, tone = "blue", title, children }) {
        const tones = {
          blue:   "bg-blue-50 border-blue-200 text-blue-900 [&_strong]:text-blue-950",
          amber:  "bg-amber-50 border-amber-200 text-amber-900",
          emerald:"bg-emerald-50 border-emerald-200 text-emerald-900",
          slate:  "bg-slate-50 border-slate-200 text-slate-800",
        };
        return (
          <div className={`border rounded-lg p-4 mb-6 flex items-start gap-3 ${tones[tone]}`}>
            <div className="shrink-0 mt-0.5"><Icon size={18} /></div>
            <div className="text-sm leading-relaxed flex-1">
              {title && <div className="font-medium mb-1">{title}</div>}
              {children}
            </div>
          </div>
        );
      }

      function FeatureBadge({ children }) {
        return <span className="inline-block text-[10px] bg-white/70 border border-current/20 rounded px-1.5 py-0.5 mr-1 mb-1">{children}</span>;
      }

      // Tiny SVG bar chart — horizontal bars, label on left, value on right.
      function BarChart({ data, unit = "", color = "#3b82f6", maxWidth = 360 }) {
        if (!data || data.length === 0) return <div className="text-xs text-slate-500 italic">No data</div>;
        const max = Math.max(...data.map((d) => d.value), 1);
        return (
          <div className="space-y-1.5">
            {data.map((d) => {
              const w = (d.value / max) * maxWidth;
              return (
                <div key={d.label} className="flex items-center gap-2 text-xs">
                  <div className="w-36 truncate text-slate-700">{d.label}</div>
                  <div className="flex-1 relative h-4 bg-slate-100 rounded">
                    <div className="absolute left-0 top-0 h-4 rounded" style={{ width: `${(d.value / max) * 100}%`, backgroundColor: color }} />
                  </div>
                  <div className="w-20 text-right font-mono text-slate-700">{typeof d.value === "number" ? d.value.toLocaleString() : d.value}{unit}</div>
                </div>
              );
            })}
          </div>
        );
      }

      // Horizontal flow diagram for Home — 7 stages with arrows between.
      function DataFlowDiagram() {
        const stages = [
          { icon: Database,     label: "External feeds",   sub: "4 CSVs → bronze",  color: "text-blue-600 bg-blue-50" },
          { icon: Layers,       label: "DLT silver",       sub: "5 validated views", color: "text-cyan-600 bg-cyan-50" },
          { icon: Boxes,        label: "Dim + fact",       sub: "Policies · claims", color: "text-sky-600 bg-sky-50" },
          { icon: GitBranch,    label: "Feature tables",   sub: "Point-in-time join",color: "text-indigo-600 bg-indigo-50" },
          { icon: FlaskConical, label: "Model factory",    sub: "GLM · GBM · XGB",  color: "text-violet-600 bg-violet-50" },
          { icon: FileText,     label: "Regulatory report",sub: "SHAP · PDP · lineage", color: "text-emerald-600 bg-emerald-50" },
          { icon: Shield,       label: "Governance",       sub: "Fairness · audit",  color: "text-slate-700 bg-slate-100" },
        ];
        return (
          <div className="overflow-x-auto pb-2">
            <div className="flex items-center gap-1 min-w-max">
              {stages.map((s, i) => {
                const Icon = s.icon;
                return (
                  <React.Fragment key={s.label}>
                    <div className="flex flex-col items-center text-center shrink-0 w-36">
                      <div className={`w-12 h-12 rounded-full flex items-center justify-center ${s.color}`}>
                        <Icon size={22} />
                      </div>
                      <div className="mt-2 text-xs font-medium text-slate-800">{s.label}</div>
                      <div className="text-[11px] text-slate-500 leading-tight mt-0.5">{s.sub}</div>
                    </div>
                    {i < stages.length - 1 && (
                      <div className="shrink-0 text-slate-400"><ArrowRight size={16} /></div>
                    )}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        );
      }

      function Table({ columns, rows, empty = "No data" }) {
        if (!rows || rows.length === 0)
          return <div className="text-sm text-slate-500 italic py-4">{empty}</div>;
        return (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-slate-500 text-xs uppercase tracking-wide border-b border-slate-200">
                  {columns.map((c) => (
                    <th key={c.key} className={`font-medium py-2 pr-3 ${c.className || ""}`}>{c.label}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {rows.map((row, i) => (
                  <tr key={i} className="hover:bg-slate-50">
                    {columns.map((c) => (
                      <td key={c.key} className={`py-2 pr-3 ${c.className || ""}`}>
                        {c.render ? c.render(row) : row[c.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      // ---------- pages ----------
      const PILLAR_META = {
        ingestion:  { icon: Database,     description: "Four vendor feeds land as CSVs, pass DLT quality gates, and require an actuary approval before they can feed the feature store.",
                      badges: ["DLT silver", "Actuary approvals", "Delta history", "Shadow pricing"] },
        features:   { icon: Boxes,        description: "Three point-in-time feature tables: training on policy-year grain, training on quote grain, serving lookup for in-force policies.",
                      badges: ["Point-in-time", "Feature store", "Catalog lineage", "Sensitivity flags"] },
        modelling:  { icon: FlaskConical, description: "Compound pricing (freq × sev GLM/GBM), single-shot Tweedie XGBoost, Bayesian PyMC, demand GBM. Champions aliased in UC.",
                      badges: ["Poisson GLM", "LightGBM", "XGBoost Tweedie", "PyMC", "Monotonicity", "UC aliases"] },
        reports:    { icon: FileText,     description: "Per-model regulatory markdown bundles — lineage from model back to CSV, TreeSHAP reason codes, partial-dependence plots, protected-attribute audit.",
                      badges: ["TreeSHAP", "PDP", "Calibration", "Double-lift", "Fairness"] },
        serving:    { icon: Rocket,       description: "Placeholder for the pricing serving endpoint + online feature store. Champion aliases are already in place, so deploy is a follow-up.",
                      badges: ["Phase 4", "Online FS", "Model Serving"] },
        governance: { icon: Shield,       description: "Every dataset approval, every model decision, every agent call is logged. Fairness + monotonicity audit runs every factory execution.",
                      badges: ["Audit log", "Fairness check", "Lineage graph"] },
      };

      function Home() {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        const [comparison, setComparison] = useState([]);
        useEffect(() => {
          api("home").then(setData).catch((e) => setErr(String(e)));
          api("models/comparison").then((r) => setComparison(r.rows || [])).catch(() => {});
        }, []);
        if (err) return <div className="text-red-600 text-sm">{err}</div>;
        if (!data) return <div className="text-slate-500 text-sm">Loading…</div>;
        const c = data.counts;
        return (
          <>
            <PageHeader title={`${data.entity} — Pricing Workbench v2`} subtitle={`Unity Catalog: ${data.catalog}`} />

            {/* Hero narrative + data-flow diagram */}
            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-lg p-6 mb-6">
              <div className="flex items-start gap-3">
                <Target size={22} className="mt-0.5 shrink-0" />
                <div>
                  <h2 className="font-semibold text-lg">Actuary-accurate. Explainable by design.</h2>
                  <p className="text-sm text-blue-50 mt-1 leading-relaxed max-w-3xl">
                    A synthetic commercial-insurance pricing pipeline that meets a regulator's bar end-to-end:
                    every feature traces back to a CSV, every model ships with a markdown report that answers
                    "why is this postcode more expensive?", and every factory run re-runs fairness + monotonicity
                    checks. No feature is used that could proxy a protected attribute.
                  </p>
                </div>
              </div>
            </div>
            <Card className="mb-6">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-medium text-slate-800 flex items-center gap-2"><Network size={16} /> End-to-end data flow</h3>
                <div className="text-xs text-slate-500">raw → silver → gold → models → reports → governance</div>
              </div>
              <DataFlowDiagram />
            </Card>

            {/* Counts — richer layout with grouping */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              <Card><StatNumber value={fmt(c.dim_companies)} label="Companies" /></Card>
              <Card><StatNumber value={fmt(c.dim_policies)} label="Policies" hint={`${fmt(c.dim_policy_versions)} versions`} /></Card>
              <Card><StatNumber value={fmt(c.fact_quotes)} label="Quotes (4-year)" /></Card>
              <Card><StatNumber value={fmt(c.fact_claims)} label="Claims" /></Card>
              <Card><StatNumber value={fmt(c.feature_policy_year_training)} label="Policy-year training rows" /></Card>
              <Card><StatNumber value={fmt(c.feature_quote_training)} label="Quote training rows" /></Card>
              <Card><StatNumber value={fmt(c.model_governance)} label="Regulatory reports generated" /></Card>
              <Card><StatNumber value={fmt(c.app_audit_log)} label="Audit events logged" /></Card>
            </div>

            {/* Current pricing state — champion aliases + model comparison */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
              <Card title="Current pricing champions"
                right={<Link to="/model-factory" className="text-xs text-blue-600 hover:underline">model factory →</Link>}>
                <div className="text-xs text-slate-500 mb-3">These aliases resolve to specific UC model versions. The pricing engine would use them in production.</div>
                <ul className="space-y-2">
                  {[
                    { alias: "pricing_champion_frequency", model: "freq_glm",         role: "Expected claim count per policy-year" },
                    { alias: "pricing_champion_severity",  model: "sev_gbm",          role: "Expected cost per claim (Gamma GBM)" },
                    { alias: "pricing_champion_single",    model: "pure_premium_xgb", role: "Single-shot Tweedie alternative" },
                    { alias: "demand_champion",            model: "demand_gbm",       role: "Probability a quote converts" },
                  ].map((x) => (
                    <li key={x.alias} className="flex items-start gap-2 text-sm">
                      <Trophy size={14} className="text-emerald-600 mt-0.5" />
                      <div className="flex-1">
                        <div><span className="font-medium">{x.alias}</span> → <code className="bg-slate-100 px-1 rounded text-xs">{x.model}</code></div>
                        <div className="text-xs text-slate-500">{x.role}</div>
                      </div>
                    </li>
                  ))}
                </ul>
              </Card>
              <Card title="Champion/challenger — 2024 test Gini"
                right={<Link to="/model-factory" className="text-xs text-blue-600 hover:underline">details →</Link>}>
                <BarChart
                  data={comparison.slice(0, 5).map((r) => ({
                    label: r.model?.replace(/ \(.*\)/, "").replace("compound_", ""),
                    value: Number(Number(r.gini_on_incurred).toFixed(4)),
                  }))}
                  color="#6366f1"
                />
              </Card>
            </div>

            {/* Pillars — richer cards with badges */}
            <h2 className="text-lg font-semibold text-slate-800 mb-3">Pillars</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              {data.pillars.map((p) => {
                const meta = PILLAR_META[p.id] || {};
                const Icon = meta.icon || Shield;
                return (
                  <Link key={p.id} to={p.path}
                    className="block bg-white rounded-lg border border-slate-200 p-5 hover:border-blue-400 hover:shadow-sm transition">
                    <div className="flex items-start gap-3">
                      <div className="p-2 rounded bg-blue-50 text-blue-600 shrink-0"><Icon size={20} /></div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between">
                          <div className="font-medium text-slate-900">{p.name}</div>
                          <ArrowRight size={14} className="text-slate-400" />
                        </div>
                        <p className="text-sm text-slate-600 mt-1 leading-relaxed">{meta.description}</p>
                        <div className="flex flex-wrap gap-1 mt-2">
                          {(meta.badges || []).map((b) => <Badge key={b} tone="slate">{b}</Badge>)}
                        </div>
                      </div>
                    </div>
                  </Link>
                );
              })}
            </div>

            <InfoBanner icon={AlertTriangle} tone="amber" title="About this demo">
              <p><strong>Bricksurance SE Pricing Workbench v2</strong> is a synthetic commercial-insurance pricing pipeline.
              All data is simulated — no real Bricksurance or partner data is used. Everything you see is generated by the
              notebooks in <code>src/00_setup</code> / <code>src/03_dimensions</code> at demo time.</p>
            </InfoBanner>
          </>
        );
      }

      function ExternalData() {
        const [data, setData] = useState(null);
        const [err, setErr] = useState(null);
        useEffect(() => { api("datasets").then(setData).catch((e) => setErr(String(e))); }, []);
        return (
          <>
            <PageHeader title="External Data"
              subtitle="Four vendor feeds arrive as CSVs in the external_landing volume, ingested to raw_* tables, then validated by DLT into silver_* tables." />
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              <InfoBanner icon={Database} tone="blue" title="Databricks features demonstrated on this page">
                <div className="flex flex-wrap gap-1 mt-1">
                  {["Unity Catalog volumes", "Auto Loader", "DLT expectations", "Delta time travel", "Column-level lineage", "Audit tables"].map((b) => <FeatureBadge key={b}>{b}</FeatureBadge>)}
                </div>
              </InfoBanner>
              <InfoBanner icon={ShieldCheck} tone="emerald" title="Why the actuary cares">
                Each new vendor file is a potential pricing-relativities shift. An actuary reviews row counts, DQ drops, and value deltas <em>before</em> the feed is allowed downstream. The approval is written to <code>app_dataset_approvals</code> with a full audit-log entry.
              </InfoBanner>
            </div>
            {err && <div className="text-red-600 text-sm mb-4">{err}</div>}
            <Card>
              <Table empty={data ? "No datasets" : "Loading…"}
                columns={[
                  { key: "name", label: "Dataset", render: (r) => (
                    <Link to={`/external-data/${r.id}`} className="text-blue-600 hover:underline font-medium flex items-center gap-1">
                      {r.name} <ChevronRight size={14} />
                    </Link>
                  ) },
                  { key: "description", label: "Description" },
                  { key: "owner", label: "Owner" },
                  { key: "raw_count",    label: "Raw rows",    render: (r) => fmt(r.raw_count) },
                  { key: "silver_count", label: "Silver rows", render: (r) => fmt(r.silver_count) },
                  { key: "dropped",      label: "DQ drops",    render: (r) => fmt(Math.max(0, r.raw_count - r.silver_count)) },
                ]}
                rows={data?.datasets ?? []} />
            </Card>
          </>
        );
      }

      function DatasetDetail() {
        const { id } = useParams();
        const [data, setData] = useState(null);
        const [approvals, setApprovals] = useState([]);
        const [tab, setTab] = useState("schema");
        const [reviewer, setReviewer] = useState("actuary.demo");
        const [notes, setNotes] = useState("");
        const [flash, setFlash] = useState(null);
        const [err, setErr] = useState(null);
        const reload = () => {
          api(`datasets/${id}`).then(setData).catch((e) => setErr(String(e)));
          api(`datasets/${id}/approvals`).then((r) => setApprovals(r.approvals)).catch(() => {});
        };

        if (!data) return <div className="text-slate-500 text-sm">Loading…</div>;

              </InfoBanner>
              <InfoBanner icon={Sparkles} tone="emerald" title="GBMs vs GLMs explainability">
                Regulators historically distrust GBMs as black boxes. Each report's <strong>Section 6</strong> shows a partial-dependence plot for every top feature — the direct analogue of a GLM's relativity curve. <strong>Section 7</strong> decomposes individual predictions via TreeSHAP: exact, additive, auditable.
              </InfoBanner>
              <InfoBanner icon={ShieldCheck} tone="amber" title="Protected-attribute absence">
                Commercial book, no individuals. Every report explicitly enumerates the attributes that are <strong>not</strong> used (gender, age, ethnicity, etc.) and cross-references the fairness audit on the Governance tab.
              </InfoBanner>
            </div>

            <Card>
              <Table empty="No reports generated yet."
                columns={[
                  { key: "model_name", label: "Model", render: (r) => (
                    <Link to={`/reports/${r.id}`} className="text-blue-600 hover:underline font-medium flex items-center gap-1">
                      <FileText size={14} /> {r.model_name || r.id}
                    </Link>
                  ) },
                  { key: "version", label: "Version", render: (r) => <Badge tone="blue">v{r.version}</Badge> },
                  { key: "alias",   label: "Alias",   render: (r) => r.alias ? <Badge tone="green">{r.alias}</Badge> : "" },
                  { key: "gini", label: "Gini", render: (r) => (
                    r.gini !== undefined ? <span className="font-mono text-sm">{Number(r.gini).toFixed(4)}</span> : "—"
                  ) },
                  { key: "total_ratio", label: "Total ratio", render: (r) => (
                    r.total_ratio !== undefined ? <span className="font-mono text-sm">{Number(r.total_ratio).toFixed(4)}</span> : "—"
                  ) },
                  { key: "test_rows", label: "Test rows", render: (r) => fmt(r.test_rows) },
                  { key: "shap_method", label: "Explanation", render: (r) => (
                    r.shap_method ? <span className="text-xs text-slate-600">{r.shap_method.split(" ")[0]}</span> : ""
                  ) },
                ]}
                rows={rows} />
            </Card>
          </>
        );
      }

      function ReportDetail() {
        const { id } = useParams();
        const [markdown, setMarkdown] = useState(null);
        const [files, setFiles] = useState({ plots: [], tables: [] });
        useEffect(() => {
          if (!id) return;
          api(`reports/${encodeURIComponent(id)}`).then((r) => setMarkdown(r.markdown)).catch(() => {});
          api(`reports/${encodeURIComponent(id)}/files`).then((r) => setFiles(r.files)).catch(() => {});
        }, [id]);
        if (!markdown) return <div className="text-slate-500 text-sm">Loading…</div>;
        const rewritten = markdown.replace(/!\[([^\]]*)\]\(plots\/([^)]+)\)/g,
          (_, alt, name) => `![${alt}](/api/reports/${encodeURIComponent(id)}/plot/${encodeURIComponent(name)})`);
        return (
          <>
            <Link to="/reports" className="text-sm text-slate-600 hover:underline flex items-center gap-1 mb-3">
              <ArrowLeft size={14} /> Back to reports
            </Link>
            <PageHeader title={id}
              actions={
                <a href={`/api/reports/${encodeURIComponent(id)}`} target="_blank" rel="noreferrer"
                  className="border border-slate-300 px-3 py-1.5 rounded text-sm flex items-center gap-1 hover:bg-slate-50">
                  <Download size={14} /> Raw markdown
                </a>
              } />
            <div className="grid grid-cols-1 lg:grid-cols-[1fr_260px] gap-6">
              <Card>
                <div className="md-report">
                  <ReactMarkdown remarkPlugins={[remarkGfm]}>{rewritten}</ReactMarkdown>
                </div>
              </Card>
              <aside className="space-y-4">
                <Card title={`Plots (${files.plots.length})`}>
                  {files.plots.length === 0 ? <div className="text-xs text-slate-500 italic">None</div> : (
                    <ul className="space-y-1">{files.plots.map((p) => (
                      <li key={p}><a href={`/api/reports/${encodeURIComponent(id)}/plot/${encodeURIComponent(p)}`} target="_blank" rel="noreferrer" className="text-xs text-blue-600 hover:underline">{p}</a></li>
                    ))}</ul>
                  )}
                </Card>
                <Card title={`Tables (${files.tables.length})`}>
                  {files.tables.length === 0 ? <div className="text-xs text-slate-500 italic">None</div> : (
                    <ul className="space-y-1">{files.tables.map((p) => (
                      <li key={p}><a href={`/api/reports/${encodeURIComponent(id)}/table/${encodeURIComponent(p)}`} target="_blank" rel="noreferrer" className="text-xs text-blue-600 hover:underline">{p}</a></li>
                    ))}</ul>
                  )}
                </Card>
              </aside>
            </div>
          </>
        );
      }

      function Governance() {
        const [summary, setSummary] = useState(null);
        const [audit, setAudit] = useState([]);
        const [lineage, setLineage] = useState(null);
        const [tab, setTab] = useState("overview");
        useEffect(() => {
          api("governance").then(setSummary).catch(() => {});
          api("governance/audit?limit=200").then((r) => setAudit(r.events)).catch(() => {});
          api("governance/lineage").then(setLineage).catch(() => {});
        }, []);
        const totalEvents   = (summary?.event_counts    || []).reduce((s, r) => s + Number(r.n || 0), 0);
        const approvedCount = (summary?.dataset_approvals || []).find((r) => r.decision === "approved")?.n || 0;
        const fairnessPass  = (summary?.fairness        || []).filter((r) => r.status === "PASS").length;
        const fairnessTotal = (summary?.fairness        || []).length;
        return (
          <>
            <PageHeader title="Governance" subtitle="Audit log, dataset approvals, fairness report, data lineage." />

            <InfoBanner icon={Shield} tone="blue" title="Why this page exists">
              A Solvency II / PRA auditor needs to reconstruct the state of the world when any model decision was made.
              Every dataset approval, model decision, and agent action is logged to <code>app_audit_log</code>; every
              feature table has a Delta version; every model has an MLflow run. Combined, this tab is the regulator's
              single point of entry.
            </InfoBanner>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              <Card><StatNumber value={fmt(totalEvents)}      label="Total audit events" /></Card>
              <Card><StatNumber value={fmt(approvedCount)}    label="Approved datasets" /></Card>
              <Card><StatNumber value={`${fairnessPass}/${fairnessTotal}`} label="Fairness checks" hint="PASS / total" /></Card>
              <Card><StatNumber value={fmt((summary?.event_counts || []).length)} label="Event types logged" /></Card>
            </div>

            <div className="flex gap-1 mb-3 border-b border-slate-200">
              {["overview", "audit", "fairness", "lineage"].map((t) => (
                <button key={t} onClick={() => setTab(t)}
                  className={`px-3 py-1.5 text-sm border-b-2 -mb-px capitalize ${
                    tab === t ? "border-blue-600 text-blue-700 font-medium" : "border-transparent text-slate-600 hover:text-slate-900"
                  }`}>{t}</button>
              ))}
            </div>
            {tab === "overview" && summary && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <Card title="Event counts">
                  <Table
                    columns={[
                      { key: "event_type", label: "Event" },
                      { key: "n", label: "Count" },
                      { key: "latest", label: "Latest" },
                    ]}
                    rows={summary.event_counts ?? []} />
                </Card>
                <Card title="Dataset approvals">
                  <Table
                    columns={[
                      { key: "decision", label: "Decision", render: (r) => (
                        <Badge tone={r.decision === "approved" ? "green" : "red"}>{r.decision}</Badge>
                      ) },
                      { key: "n", label: "Count" },
                    ]}
                    rows={summary.dataset_approvals ?? []} />
                </Card>
                <Card title="Fairness checks" className="lg:col-span-2">
                  <Table
                    columns={[
                      { key: "check", label: "Check" },
                      { key: "status", label: "Status", render: (r) => {
                        if (r.status === "PASS") return <Badge tone="green">PASS</Badge>;
                        if (r.status === "FAIL") return <Badge tone="red">FAIL</Badge>;
                        return <Badge tone="slate">{r.status}</Badge>;
                      } },
                      { key: "detail", label: "Detail" },
                    ]}
                    rows={summary.fairness ?? []} />
                </Card>
              </div>
            )}
            {tab === "audit" && (
              <Card title={`Audit log (${audit.length} events)`}>
                <Table
                  columns={[
                    { key: "timestamp", label: "When" },
                    { key: "event_type", label: "Event", render: (r) => (
                      <Badge tone={r.event_type?.includes("rejected") ? "red" : r.event_type?.includes("approved") ? "green" : "slate"}>{r.event_type}</Badge>
                    ) },
                    { key: "entity_type", label: "Type" },
                    { key: "entity_id", label: "Entity", className: "font-mono text-xs" },
                    { key: "user_id", label: "User" },
                    { key: "source", label: "Source" },
                  ]}
                  rows={audit} />
              </Card>
            )}
            {tab === "fairness" && summary && (
              <Card title="Fairness + robustness audit — from 09_fairness_and_robustness">
                <Table
                  columns={[
                    { key: "check", label: "Check" },
                    { key: "status", label: "Status", render: (r) => {
                      if (r.status === "PASS") return <Badge tone="green">PASS</Badge>;
                      if (r.status === "FAIL") return <Badge tone="red">FAIL</Badge>;
                      return <Badge tone="slate">{r.status}</Badge>;
                    } },
                    { key: "detail", label: "Detail" },
                  ]}
                  rows={summary.fairness ?? []} />
              </Card>
            )}
            {tab === "lineage" && lineage && (
              <div className="grid grid-cols-1 gap-4">
                {["feature_tables", "silver", "raw"].map((bucket) => (
                  <Card key={bucket} title={bucket.replace("_", " ")}>
                    <Table
                      columns={[
                        { key: "table", label: "Table", className: "font-mono text-sm" },
                        { key: "delta_version", label: "Delta version", render: (r) => <Badge tone="blue">v{r.delta_version ?? "?"}</Badge> },
                        { key: "row_count", label: "Rows" },
                      ]}
                      rows={lineage[bucket] ?? []} />
                  </Card>
                ))}
              </div>
            )}
          </>
        );
      }

      function Serving() {
        const [data, setData] = useState(null);
        useEffect(() => { api("serving").then(setData).catch(() => {}); }, []);
        return (
          <>
            <PageHeader title="Serving" subtitle="Model Serving endpoint + online feature store" />
            <Card>
              <div className="flex items-start gap-4">
                <div className="p-3 rounded-full bg-blue-50 text-blue-600 shrink-0"><Rocket size={20} /></div>
                <div className="flex-1">
                  <h3 className="font-semibold text-slate-800 flex items-center gap-2"><Clock size={14} /> Phase 4 — placeholder</h3>
                  <p className="text-sm text-slate-600 mt-2">
                    {data?.message || "The serving endpoint is planned as a follow-up."}
                  </p>
                  {data?.plan?.length > 0 && (
                    <ul className="list-disc pl-5 mt-3 space-y-1 text-sm text-slate-700">
                      {data.plan.map((item, i) => <li key={i}>{item}</li>)}
                    </ul>
                  )}
                </div>
              </div>
            </Card>
          </>
        );
      }

      function Monitoring() {
        const [comparison, setComparison] = useState([]);
        const [lineage, setLineage] = useState(null);
        const [fairness, setFairness] = useState([]);
        useEffect(() => {
          api("models/comparison").then((r) => setComparison(r.rows || [])).catch(() => {});
          api("governance/lineage").then(setLineage).catch(() => {});
          api("governance/fairness").then((r) => setFairness(r.checks || [])).catch(() => {});
        }, []);
        const fairnessPass  = fairness.filter((r) => r.status === "PASS").length;
        const fairnessTotal = fairness.length;
        return (
          <>
            <PageHeader title="Monitoring" subtitle="Head of Pricing asks every morning: is the book behaving? Is the model still calibrated? What landed overnight?" />

            <InfoBanner icon={Gauge} tone="blue" title="What's here vs Phase 4">
              Live drift detection (PSI per feature, rolling Gini, endpoint p50/p95) requires the serving endpoint from Phase 4. This page today surfaces the <em>offline</em> signals: factory test-set metrics, DLT pass rates, dataset freshness, fairness audit, and Delta versions so you can see when anything last changed.
            </InfoBanner>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <Card title="Model stability — test-set Gini by candidate">
                <div className="text-xs text-slate-500 mb-2">Higher = better discrimination. Tracks the champion/challenger race over every factory run.</div>
                <BarChart
                  data={comparison.map((r) => ({
                    label: r.model?.replace(/ \(.*\)/, "").replace("compound_", ""),
                    value: Number(Number(r.gini_on_incurred).toFixed(4)),
                  }))}
                  color="#6366f1" />
              </Card>

              <Card title="Portfolio calibration — predicted / actual total">
                <div className="text-xs text-slate-500 mb-2">1.00 = perfectly calibrated. &lt;1 underpredicts, &gt;1 overpredicts.</div>
                <Table empty="—"
                  columns={[
                    { key: "model", label: "Candidate", className: "font-medium text-xs" },
                    { key: "total_ratio", label: "Ratio", render: (r) => (
                      <span className={`font-mono text-sm ${
                        Math.abs(Number(r.total_ratio) - 1) > 0.1 ? "text-red-600"
                          : Math.abs(Number(r.total_ratio) - 1) > 0.05 ? "text-amber-600"
                          : "text-emerald-700"
                      }`}>{Number(r.total_ratio).toFixed(4)}</span>
                    ) },
                    { key: "status", label: "State", render: (r) => {
                      const d = Math.abs(Number(r.total_ratio) - 1);
                      if (d < 0.05) return <Badge tone="green">healthy</Badge>;
                      if (d < 0.1)  return <Badge tone="amber">drift</Badge>;
                      return <Badge tone="red">miscalibrated</Badge>;
                    } },
                  ]}
                  rows={comparison} />
              </Card>

              <Card title="Data freshness — latest Delta commit">
                <div className="text-xs text-slate-500 mb-2">When did each upstream table last change? Stale raw data is the earliest drift signal.</div>
                <Table empty="—"
                  columns={[
                    { key: "table",         label: "Table",   className: "font-mono text-xs" },
                    { key: "delta_version", label: "Delta v", render: (r) => <Badge tone="blue">v{r.delta_version ?? "?"}</Badge> },
                    { key: "row_count",     label: "Rows",    render: (r) => fmt(r.row_count) },
                  ]}
                  rows={[...(lineage?.raw ?? []), ...(lineage?.silver ?? [])]} />
              </Card>

              <Card title="Fairness + robustness — cross-model audit"
                right={<Link to="/governance" className="text-xs text-blue-600 hover:underline">full audit →</Link>}>
                <div className="mb-3">
                  <div className="text-2xl font-semibold text-slate-900">{fairnessPass}/{fairnessTotal}</div>
                  <div className="text-xs uppercase tracking-wide text-slate-500">checks passing</div>
                </div>
                <Table empty="—"
                  columns={[
                    { key: "check", label: "Check" },
                    { key: "status", label: "", render: (r) => {
                      if (r.status === "PASS") return <Badge tone="green">PASS</Badge>;
                      if (r.status === "FAIL") return <Badge tone="red">FAIL</Badge>;
                      return <Badge tone="slate">{r.status}</Badge>;
                    } },
                    { key: "detail", label: "Detail", className: "text-xs text-slate-500" },
                  ]}
                  rows={fairness} />
              </Card>

              <Card title="Operational — feature tables">
                <div className="text-xs text-slate-500 mb-2">Row counts and current version of every feature table the models consume.</div>
                <Table empty="—"
                  columns={[
                    { key: "table",         label: "Feature table", className: "font-mono text-xs" },
                    { key: "delta_version", label: "Delta v",        render: (r) => <Badge tone="blue">v{r.delta_version ?? "?"}</Badge> },
                    { key: "row_count",     label: "Rows",           render: (r) => fmt(r.row_count) },
                  ]}
                  rows={lineage?.feature_tables ?? []} />
              </Card>

              <Card title="Alerting — planned">
                <div className="text-sm text-slate-600 space-y-2">
                  <p>When the serving endpoint lands in Phase 4, this panel surfaces:</p>
                  <ul className="list-disc pl-5 space-y-1 text-slate-600">
                    <li>PSI &gt; 0.2 on any top-10 feature (population drift)</li>
                    <li>Rolling 30-day Gini down &gt;10% vs baseline</li>
                    <li>p95 latency &gt; 200ms on pricing endpoint</li>
                    <li>Any fairness check flipping PASS → FAIL overnight</li>
                  </ul>
                  <p className="text-xs text-slate-500 italic">Alerts will feed the Governance audit log so they are fully traceable.</p>
                </div>
              </Card>
            </div>
          </>
        );
      }

      function QuoteReview() {
        return (
          <>
            <PageHeader title="Quote Review" subtitle="Per-quote forensic drill-down with model replay and SHAP (bolt-on)." />
            <Card>
              <div className="flex items-start gap-4">
                <div className="p-3 rounded-full bg-indigo-50 text-indigo-600 shrink-0"><Zap size={20} /></div>
                <div>
                  <h3 className="font-semibold text-slate-800">Placeholder</h3>
                  <p className="text-sm text-slate-600 mt-2">
                    Reads saved quote payloads from the <code className="bg-slate-100 px-1 mx-1 rounded text-xs">saved_payloads</code> volume, rescores against the current champion, and renders per-feature SHAP contributions. UI-only work — backend data is already in place.
                  </p>
                </div>
              </div>
            </Card>
          </>
        );
      }

      // ---------- app shell ----------
      function App() {
        return (
          <div className="flex min-h-screen">
            <Sidebar />
            <main className="flex-1 overflow-x-hidden">
              <div className="max-w-7xl mx-auto px-6 py-8">
                <Routes>
                  <Route path="/"                    element={<Home />} />
                  <Route path="/external-data"       element={<ExternalData />} />
                  <Route path="/external-data/:id"   element={<DatasetDetail />} />
                  <Route path="/feature-table"       element={<FeatureTable />} />
                  <Route path="/feature-table/:id"   element={<FeatureTableDetail />} />
                  <Route path="/policies"            element={<Policies />} />
                  <Route path="/policies/:id"        element={<PolicyDetail />} />
                  <Route path="/model-factory"       element={<ModelFactory />} />
                  <Route path="/model-factory/:name" element={<ModelDetail />} />
                  <Route path="/reports"             element={<Reports />} />
                  <Route path="/reports/:id"         element={<ReportDetail />} />
                  <Route path="/serving"             element={<Serving />} />
                  <Route path="/monitoring"          element={<Monitoring />} />
                  <Route path="/governance"          element={<Governance />} />
                  <Route path="/quote-review"        element={<QuoteReview />} />
                </Routes>
              </div>
            </main>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(
        <HashRouter>
          <App />
        </HashRouter>
      );
    </script>
  </body>
</html>
