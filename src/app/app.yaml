command:
  - "uvicorn"
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: CATALOG_NAME
    value: "lr_serverless_aws_us_catalog"
  - name: SCHEMA_NAME
    value: "pricing_workbench"
  - name: REPORTS_VOLUME
    value: "reports"
  - name: EXTERNAL_LANDING_VOLUME
    value: "external_landing"
  - name: ENTITY_NAME
    value: "Bricksurance SE"
  # Genie spaces — fill in the space IDs for the pricing + quote datasets. Empty
  # values are handled gracefully by the UI (the embed panels show a setup hint).
  - name: GENIE_SPACE_PRICING
    value: ""
  - name: GENIE_SPACE_QUOTES
    value: ""
  # WAREHOUSE_ID and DATABRICKS_* are auto-injected from the app's resource bindings
